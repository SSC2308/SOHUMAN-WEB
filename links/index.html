<head>

  <meta name="twitter:description" content="Mentoría privada para mujeres listas para transformar su identidad, mente y decisiones." />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --base:  #F0E8E1;
      --sage:  #89938C;
      --coral: #AF4828;
      --gold:  #B39160;
      --dark:  #272727;
      --card:  #FAF5F1;
    }

    body {
      background: var(--base);
      font-family: 'Montserrat', sans-serif;
      font-weight: 300;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0 20px;
      opacity: 0;
      animation: fadeIn 0.8s ease 0.1s forwards;
    }

    @keyframes fadeIn { to { opacity: 1; } }

    /* ── Lang toggle ── */
    .lang-toggle {
      position: fixed;
      top: 18px;
      right: 18px;
      display: flex;
      gap: 4px;
      z-index: 10;
    }
    .lang-toggle button {
      background: none;
      border: 1px solid rgba(39,39,39,0.18);
      border-radius: 6px;
      padding: 4px 9px;
      font-family: 'Montserrat', sans-serif;
      font-size: 0.65rem;
      font-weight: 500;
      letter-spacing: 0.08em;
      color: var(--dark);
      cursor: pointer;
      opacity: 0.45;
      transition: opacity 0.15s, background 0.15s;
    }
    .lang-toggle button.is-active {
      opacity: 1;
      background: var(--dark);
      color: #fff;
      border-color: var(--dark);
    }
    .lang-toggle button:hover:not(.is-active) { opacity: 0.75; }

    /* ── Container ── */
    .wrap {
      width: 100%;
      max-width: 440px;
      display: flex;
      flex-direction: column;
      align-items: center;
      flex: 1;
      padding: 56px 0 0;
    }

    /* ── Avatar ── */
    .avatar {
      width: 108px;
      height: 108px;
      border-radius: 50%;
      overflow: hidden;
      margin-bottom: 22px;
      box-shadow: 0 4px 20px rgba(39,39,39,0.12);
    }
    .avatar img { width: 100%; height: 100%; object-fit: cover; }

    /* ── Brand name ── */
    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2.6rem;
      font-weight: 500;
      letter-spacing: 0.22em;
      color: var(--dark);
      text-transform: uppercase;
      margin-bottom: 10px;
      text-align: center;
    }

    /* ── Tagline ── */
    .tagline {
      font-family: 'Montserrat', sans-serif;
      font-size: 0.62rem;
      font-weight: 400;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--gold);
      text-align: center;
      margin-bottom: 40px;
      transition: opacity 0.2s;
    }

    /* ── Links ── */
    .links {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 48px;
    }

    .btn {
      display: flex;
      align-items: center;
      width: 100%;
      background: var(--card);
      border: none;
      border-radius: 14px;
      padding: 14px 18px;
      text-decoration: none;
      color: var(--dark);
      box-shadow: 0 2px 12px rgba(39,39,39,0.06);
      transition: transform 0.18s ease, box-shadow 0.18s ease;
    }
    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(39,39,39,0.11);
    }
    .btn:active { transform: translateY(0); }

    .ic {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .ic svg { width: 20px; height: 20px; }
    .ic-sage  { background: var(--sage); }
    .ic-coral { background: var(--coral); }
    .ic-gold  { background: var(--gold); }
    .ic-dark  { background: var(--dark); }
    .ic-wa    { background: #25A560; }

    .lbl {
      flex: 1;
      text-align: center;
      font-size: 0.72rem;
      font-weight: 500;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--dark);
      padding-right: 18px;
    }

    .arr {
      font-size: 1rem;
      color: var(--coral);
      flex-shrink: 0;
      line-height: 1;
      opacity: 0.7;
      transition: opacity 0.18s, transform 0.18s;
    }
    .btn:hover .arr { opacity: 1; transform: translate(2px,-2px); }

    /* ── Footer ── */
    footer {
      width: 100%;
      max-width: 440px;
      text-align: center;
      padding: 0 0 44px;
    }
    .footer-phrase {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 1.05rem;
      font-weight: 400;
      color: var(--gold);
      letter-spacing: 0.01em;
      line-height: 1.5;
      margin-bottom: 14px;
    }
    .footer-star {
      display: block;
      margin: 0 auto 14px;
      width: 40px;
      height: 40px;
      opacity: 0.75;
    }
    .footer-url {
      font-size: 0.68rem;
      letter-spacing: 0.1em;
      color: var(--sage);
      text-decoration: none;
      opacity: 0.75;
    }
    .footer-url:hover { opacity: 1; }
  </style>
</head>

<script>
  const t = {
    es: {
      tagline:       'Conecta contigo, transforma tu vida.',
      'btn-website': 'Mi sitio web',
      'btn-mentoria':'Aplica a mentoría privada',
      'btn-sesion':  'Agenda una sesión',
      'btn-whatsapp': 'Escríbeme por WhatsApp',
      'btn-ebook':   'Soltar para Expandirte',
      'footer-phrase':'Vive en coherencia, expande tu esencia.',
      'wa-general':  'Hola Elena 🤍\n\nTengo una consulta general.',
    },
    en: {
      tagline:       'Connect with yourself, transform your life.',
      'btn-website': 'My website',
      'btn-mentoria':'Apply for private mentoring',
      'btn-sesion':  'Schedule a session',
      'btn-whatsapp':'Message me on WhatsApp',
      'btn-ebook':   'Let Go to Expand',
      'footer-phrase':'Live in coherence, expand your essence.',
      'wa-general':  'Hi Elena 🤍\n\nI have a general inquiry.',
    }
  };

  let lang = 'es';

  function applyLang(l) {
    lang = l;
    document.documentElement.lang = l;

    // Update text nodes
    document.querySelectorAll('[data-i18n]').forEach(el => {
      const key = el.getAttribute('data-i18n');
      if (t[l][key] !== undefined) el.textContent = t[l][key];
    });

    // Update toggle button states
    document.querySelectorAll('.lang-toggle button').forEach(btn => {
      btn.classList.toggle('is-active', btn.dataset.lang === l);
    });

    // Update hrefs that point to the main site — pass lang as param
    document.getElementById('btn-website').href =
      'https://elenasohuman.com' + (l === 'en' ? '?lang=en' : '');

    document.getElementById('btn-mentoria').href =
      '../index.html?modal=apply&lang=' + l;

    document.getElementById('btn-whatsapp').href = l === 'en'
      ? 'https://api.whatsapp.com/send?phone=17867372251&text=Hi%20Elena%20%F0%9F%A4%8D%0A%0AI%20have%20a%20general%20inquiry.'
      : 'https://api.whatsapp.com/send?phone=17867372251&text=Hola%20Elena%20%F0%9F%A4%8D%0A%0ATengo%20una%20consulta%20general.';

    document.getElementById('btn-ebook').href =
      '../index.html?modal=ebook1&lang=' + l;
  }

  // Init: read URL param, fallback to 'es'
  const urlLang = new URLSearchParams(window.location.search).get('lang');
  applyLang(urlLang === 'en' ? 'en' : 'es');

  // Toggle listeners
  document.querySelectorAll('.lang-toggle button').forEach(btn => {
    btn.addEventListener('click', () => applyLang(btn.dataset.lang));
  });
</script>
